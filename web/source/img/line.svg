<svg width="100%" height="100%" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="wavePattern" x="0" y="0" width="300" height="150" patternUnits="userSpaceOnUse">
      
      <!-- 多条正弦波 -->
      <g fill="none" stroke="#6b8cff" stroke-opacity="0.15" stroke-width="1">
        
        <!-- 生成多条相位偏移的波 -->
        <path d="M0 75 
                 Q 75 25, 150 75 
                 T 300 75" />
        
        <path d="M0 75 
                 Q 75 35, 150 75 
                 T 300 75" />
        
        <path d="M0 75 
                 Q 75 45, 150 75 
                 T 300 75" />
        
        <path d="M0 75 
                 Q 75 55, 150 75 
                 T 300 75" />
        
        <path d="M0 75 
                 Q 75 65, 150 75 
                 T 300 75" />

      </g>

    </pattern>
  </defs>

  <!-- 背景填充 -->
  <rect width="100%" height="100%" fill="url(#wavePattern)" />
</svg>